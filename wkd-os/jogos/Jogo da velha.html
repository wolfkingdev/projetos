<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Ultra</title>
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent-x: #38bdf8;
            --accent-o: #fb7185;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .header { text-align: center; margin-bottom: 2rem; }
        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 0.5rem; }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--glass);
            padding: 0.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        button {
            background: transparent;
            border: none;
            color: var(--text);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        button.active { background: var(--accent-x); color: var(--bg); }
        button:hover:not(.active) { background: var(--border); }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 12px;
            background: var(--glass);
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        .cell {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s;
            user-select: none;
        }

        .cell:hover { background: var(--border); }
        .cell.x { color: var(--accent-x); }
        .cell.o { color: var(--accent-o); }
        
        .status {
            margin-top: 2rem;
            font-size: 1.2rem;
            height: 1.5rem;
            font-weight: 300;
        }

        .reset-btn {
            margin-top: 2rem;
            background: var(--text);
            color: var(--bg);
            padding: 0.8rem 2rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>TIC-TAC-TOE</h1>
        <div class="status" id="status">Sua vez (X)</div>
    </div>

    <div class="controls">
        <button id="btnAi" class="active" onclick="setMode('ai')">Contra IA</button>
        <button id="btnPvp" onclick="setMode('pvp')">2 Jogadores</button>
    </div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button class="reset-btn" onclick="resetGame()">Reiniciar Partida</button>

    <script>
        const boardEl = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const statusEl = document.getElementById('status');
        
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let isGameActive = true;
        let gameMode = 'ai'; // 'ai' ou 'pvp'

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function setMode(mode) {
            gameMode = mode;
            document.getElementById('btnAi').classList.toggle('active', mode === 'ai');
            document.getElementById('btnPvp').classList.toggle('active', mode === 'pvp');
            resetGame();
        }

        function handleCellClick(e) {
            const index = e.target.dataset.index;
            if (board[index] !== "" || !isGameActive) return;

            makeMove(index, "X");

            if (isGameActive && gameMode === 'ai') {
                setTimeout(bestMove, 400);
            } else if (isGameActive && gameMode === 'pvp') {
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                statusEl.innerText = `Vez de: ${currentPlayer}`;
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            cells[index].innerText = player;
            cells[index].classList.add(player.toLowerCase());
            checkResult();
        }

        function checkResult() {
            let roundWon = false;
            for (let condition of winConditions) {
                const [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusEl.innerText = `Vencedor: ${currentPlayer}!`;
                isGameActive = false;
                return;
            }

            if (!board.includes("")) {
                statusEl.innerText = "Empate!";
                isGameActive = false;
                return;
            }
        }

        // --- Algoritmo Minimax (IA) ---
        function bestMove() {
            let bestScore = -Infinity;
            let move;
            for (let i = 0; i < 9; i++) {
                if (board[i] === "") {
                    board[i] = "O";
                    let score = minimax(board, 0, false);
                    board[i] = "";
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            currentPlayer = "O";
            makeMove(move, "O");
            if (isGameActive) {
                currentPlayer = "X";
                statusEl.innerText = "Sua vez (X)";
            }
        }

        const scores = { X: -10, O: 10, tie: 0 };

        function minimax(board, depth, isMaximizing) {
            let result = checkWinnerRaw();
            if (result !== null) return scores[result];

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === "") {
                        board[i] = "O";
                        let score = minimax(board, depth + 1, false);
                        board[i] = "";
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === "") {
                        board[i] = "X";
                        let score = minimax(board, depth + 1, true);
                        board[i] = "";
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function checkWinnerRaw() {
            for (let condition of winConditions) {
                const [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
            }
            return !board.includes("") ? "tie" : null;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            isGameActive = true;
            currentPlayer = "X";
            statusEl.innerText = "Sua vez (X)";
            cells.forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('x', 'o');
            });
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
    </script>
</body>
</html>
