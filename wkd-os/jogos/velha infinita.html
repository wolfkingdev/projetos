<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VELHA INFINITA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --bg-panel: #0a0a1a;
            --neon-blue: #00f3ff;
            --neon-blue-glow: rgba(0, 243, 255, 0.4);
            --neon-pink: #ff007a;
            --neon-pink-glow: rgba(255, 0, 122, 0.4);
            --text-main: #ffffff;
            --text-dim: #707080;
            
            /* Dimensões Dinâmicas Adaptativas */
            --board-size: 85vmin; /* Baseado na menor dimensão da tela */
            --cell-size: calc((var(--board-size) - 40px) / 3);
            --font-piece: calc(var(--cell-size) * 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centralização Vertical Absoluta */
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow: hidden;
            position: relative;
        }

        /* Fundo com Grade (como na imagem) */
        body::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 243, 255, 0.03) 25%, rgba(0, 243, 255, 0.03) 26%, transparent 27%, transparent 74%, rgba(0, 243, 255, 0.03) 75%, rgba(0, 243, 255, 0.03) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 243, 255, 0.03) 25%, rgba(0, 243, 255, 0.03) 26%, transparent 27%, transparent 74%, rgba(0, 243, 255, 0.03) 75%, rgba(0, 243, 255, 0.03) 76%, transparent 77%, transparent);
            background-size: 80px 80px;
            z-index: 0;
        }

        /* --- Main Content Container (para centralizar tudo) --- */
        .game-root {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            /* Garante que o container ocupe altura se necessário para flex */
            flex: 1; 
            max-height: 100vh;
        }

        /* --- UI Elements --- */
        header {
            text-align: center;
            margin-bottom: 2vh; /* Espaçamento dinâmico inferior */
            width: 100%;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 6vw, 2.2rem);
            font-weight: 900;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
            margin-bottom: 2vh;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #02020a;
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .score-box { text-align: center; flex: 1; }
        .score-label { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
        .score-val { font-family: 'Orbitron', sans-serif; font-size: clamp(1.2rem, 5vw, 1.8rem); font-weight: 700; }
        
        .pX { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .pO { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }

        .vs-divider {
            font-family: 'Orbitron', sans-serif;
            color: var(--text-dim);
            margin: 0 15px;
            font-size: 0.8rem;
        }

        /* --- Game Board --- */
        .game-area {
            position: relative;
            width: var(--board-size);
            height: var(--board-size);
            background: #000005;
            border-radius: 16px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 2vh; /* Espaçamento dinâmico inferior */
        }

        .cell {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background 0.2s;
        }

        @media (hover: hover) {
            .cell:hover:not(.occupied) {
                background: rgba(255, 255, 255, 0.05);
            }
        }

        /* --- Peças (X e O) --- */
        .piece {
            font-family: 'Orbitron', sans-serif;
            font-size: var(--font-piece);
            font-weight: 900;
            position: absolute;
            line-height: 1;
            pointer-events: none;
            will-change: transform, opacity;
        }

        .piece.x {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue-glow);
            animation: spawnX 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .piece.o {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink-glow);
            animation: spawnO 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes spawnX { from { transform: scale(0) rotate(-45deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
        @keyframes spawnO { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- Feedback de Peça prestes a sumir (Glitch Color) --- */
        .piece.ghost {
            animation: pulse-ghost 1.5s infinite alternate, glitch 0.5s infinite;
            filter: blur(1px);
        }

        @keyframes pulse-ghost { from { opacity: 0.3; } to { opacity: 0.6; } }
        
        @keyframes glitch {
            0% { transform: translate(0); text-shadow: 0 0 10px currentColor; }
            20% { transform: translate(-2px, 1px); text-shadow: -2px 0 red, 2px 0 blue; }
            40% { transform: translate(2px, -1px); text-shadow: 0 0 10px currentColor; }
            100% { transform: translate(0); }
        }

        /* --- Controls --- */
        .controls-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 100%;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 24px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            background: #02020a;
            color: var(--text-dim);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.3s;
        }

        button.active-mode {
            color: var(--neon-blue);
            border-color: var(--neon-blue);
            background: rgba(0, 243, 255, 0.05);
            box-shadow: 0 0 15px var(--neon-blue-glow);
        }

        button.reset-btn {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            margin-top: 5px;
        }
        button.reset-btn:hover { background: var(--neon-pink); color: #000; }

        .icon-btn {
            padding: 12px;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- Modais --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            opacity: 0; pointer-events: none; transition: opacity 0.4s;
        }
        .modal.active { opacity: 1; pointer-events: all; }
        .modal-content { text-align: center; transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal.active .modal-content { transform: scale(1); }
        .modal h2 { font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 10vw, 4rem); text-transform: uppercase; margin-bottom: 30px; }

        @media (max-height: 500px) and (orientation: landscape) {
            :root { --board-size: 70vmin; }
            .game-root { flex-direction: row; gap: 20px; }
            header { margin-bottom: 0; }
            .controls-row { flex-direction: column; gap: 8px; }
        }

    </style>
</head>
<body>

    <div class="game-root">
        <header>
            <h1>VELHA INFINITA</h1>
            <div class="scoreboard">
                <div class="score-box pX">
                    <div class="score-label">Player X</div>
                    <div class="score-val" id="score-x">0</div>
                </div>
                <div class="vs-divider">VS</div>
                <div class="score-box pO">
                    <div class="score-label" id="p2-label">CPU O</div>
                    <div class="score-val" id="score-o">0</div>
                </div>
            </div>
        </header>

        <main class="game-area" id="board" role="grid">
            </main>

        <div class="controls-row">
            <button id="btn-audio" class="icon-btn" title="Alternar Som">
                <svg id="icon-sound-on" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M14 3.23V5.29C16.89 6.15 19 8.83 19 12S16.89 17.85 14 18.71V20.77C18 19.86 21 16.28 21 12S18 4.14 14 3.23M16.5 12C16.5 10.23 15.5 8.71 14 7.97V16.03C15.5 15.29 16.5 13.77 16.5 12M3 9V15H7L12 20V4L7 9H3Z"/></svg>
                <svg id="icon-sound-off" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4L9.91 6.09L12 8.18M4.27 3L3 4.27L7.73 9H3V15H7L12 20V13.27L16.25 17.53C15.58 18.04 14.83 18.46 14 18.7V20.76C15.38 20.45 16.63 19.82 17.68 18.96L19.73 21L21 19.73M19 12C19 12.94 18.8 13.82 18.46 14.63L19.97 16.15C20.62 14.91 21 13.5 21 12S18 4.14 14 3.23V5.29C16.89 6.15 19 8.83 19 12Z"/></svg>
            </button>
            <button id="btn-mode-cpu" class="active-mode">Vs CPU</button>
            <button id="btn-mode-pvp">2 Players</button>
        </div>
        <button class="reset-btn" id="btn-reset">Reset</button>

    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modal-title">X Venceu!</h2>
            <button class="reset-btn" onclick="Game.closeModal()">Jogar Novamente</button>
        </div>
    </div>

    <script>
        "use strict";

        // --- Audio Engine (MANTIDO E MELHORADO) ---
        const AudioEngine = (() => {
            let muted = true; // Começa mudo por UX boas práticas
            const ctx = new (window.AudioContext || window.webkitAudioContext)();

            const playSound = (freq, type, duration, vol, ramp=true) => {
                if (muted) return;
                if (ctx.state === 'suspended') ctx.resume();
                
                const osc = ctx.createOscillator();
                const gainN = ctx.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                
                gainN.gain.setValueAtTime(vol, ctx.currentTime);
                if(ramp) gainN.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                
                osc.connect(gainN);
                gainN.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + duration);
            };

            return {
                toggleMute: () => { 
                    muted = !muted; 
                    document.getElementById('icon-sound-on').style.display = muted ? 'none' : 'block';
                    document.getElementById('icon-sound-off').style.display = muted ? 'block' : 'none';
                    return muted;
                },
                playClickPlayer: () => playSound(880, 'sine', 0.1, 0.3),
                playClickCPU: () => playSound(220, 'square', 0.1, 0.1),
                playVanishing: () => {
                    playSound(660, 'sine', 0.2, 0.2, false);
                    setTimeout(() => playSound(440, 'sine', 0.2, 0.2, false), 100);
                },
                playWin: () => {
                    [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                        setTimeout(() => playSound(f, 'sine', 0.4, 0.3), i * 150);
                    });
                },
                playLose: () => {
                    [392.00, 349.23, 329.63, 261.63].forEach((f, i) => {
                        setTimeout(() => playSound(f, 'square', 0.5, 0.1), i * 200);
                    });
                }
            };
        })();

        // --- Core Game Logic (MANTIDO INTEGRALMENTE) ---
        const Game = (() => {
            const boardEl = document.getElementById('board');
            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modal-title');
            const scoreXEl = document.getElementById('score-x');
            const scoreOEl = document.getElementById('score-o');
            const p2Label = document.getElementById('p2-label');

            let state = Array(9).fill(null);
            let history = { X: [], O: [] };
            let turn = 'X';
            let scores = { X: 0, O: 0 };
            let isVsCPU = true;
            let gameActive = true;
            let cells = [];

            const WIN_COMBS = [
                [0,1,2], [3,4,5], [6,7,8], // H
                [0,3,6], [1,4,7], [2,5,8], // V
                [0,4,8], [2,4,6]           // D
            ];

            const init = () => {
                boardEl.innerHTML = '';
                for (let i = 0; i < 9; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.index = i;
                    cell.setAttribute('role', 'gridcell');
                    cell.addEventListener('click', () => handleCellClick(i));
                    boardEl.appendChild(cell);
                    cells.push(cell);
                }

                document.getElementById('btn-reset').addEventListener('click', resetGame);
                document.getElementById('btn-mode-cpu').addEventListener('click', (e) => setMode(true, e.target));
                document.getElementById('btn-mode-pvp').addEventListener('click', (e) => setMode(false, e.target));
                document.getElementById('btn-audio').addEventListener('click', AudioEngine.toggleMute);
            };

            const handleCellClick = (index) => {
                if (!gameActive || state[index] || (isVsCPU && turn === 'O')) return;
                
                if(navigator.vibrate) navigator.vibrate(30);
                AudioEngine.playClickPlayer();
                
                executeMove(index);
            };

            const executeMove = (index) => {
                let vanished = false;

                // Lógica INFINITY (MANTIDA)
                if (history[turn].length === 3) {
                    const oldestIndex = history[turn].shift();
                    state[oldestIndex] = null;
                    vanished = true;
                }

                state[index] = turn;
                history[turn].push(index);

                if(vanished) AudioEngine.playVanishing();

                renderState();

                if (checkWin(state, turn)) {
                    endGame(turn);
                    return;
                }

                turn = turn === 'X' ? 'O' : 'X';

                if (isVsCPU && turn === 'O' && gameActive) {
                    setTimeout(cpuLogic, vanished ? 800 : 500);
                }
            };

            const renderState = () => {
                cells.forEach((cell, i) => {
                    cell.innerHTML = '';
                    cell.classList.remove('occupied');

                    if (state[i]) {
                        cell.classList.add('occupied');
                        const span = document.createElement('span');
                        span.className = `piece ${state[i].toLowerCase()}`;
                        
                        // Feedback visual de qual peça vai sumir (MELHORADO)
                        if (history[state[i]].length === 3 && history[state[i]][0] === i) {
                            span.classList.add('ghost');
                        }
                        
                        span.innerText = state[i];
                        cell.appendChild(span);
                    }
                });
            };

            const checkWin = (board, player) => {
                return WIN_COMBS.some(comb => comb.every(idx => board[idx] === player));
            };

            // --- IA AVANÇADA (MANTIDA) ---
            const cpuLogic = () => {
                if (!gameActive) return;
                AudioEngine.playClickCPU();
                const bestMove = getBestMove();
                executeMove(bestMove);
            };

            const getBestMove = () => {
                // 1. Vencer agora?
                for (let i = 0; i < 9; i++) {
                    if (state[i] === null) {
                        let nextState = simulateNextState(state, history, 'O', i);
                        if (checkWin(nextState, 'O')) return i;
                    }
                }
                // 2. Bloquear jogador?
                for (let i = 0; i < 9; i++) {
                    if (state[i] === null) {
                        let nextPlayerState = simulateNextState(state, history, 'X', i);
                        if (checkWin(nextPlayerState, 'X')) return i;
                    }
                }
                // 3. Estratégia Posicional
                if (state[4] === null) return 4;
                const corners = [0, 2, 6, 8].sort(() => Math.random() - 0.5);
                for (let c of corners) if (state[c] === null) return c;
                return [1, 3, 5, 7].find(s => state[s] === null) || 0;
            };

            const simulateNextState = (currentBoard, currentHistory, player, moveIndex) => {
                let boardCopy = [...currentBoard];
                if (currentHistory[player].length === 3) {
                    const oldest = currentHistory[player][0];
                    boardCopy[oldest] = null;
                }
                boardCopy[moveIndex] = player;
                return boardCopy;
            };

            // --- Fim de Jogo (MANTIDO) ---
            const endGame = (winner) => {
                gameActive = false;
                scores[winner]++;
                
                scoreXEl.innerText = scores.X;
                scoreOEl.innerText = scores.O;

                modalTitle.innerText = `${winner} Venceu!`;
                modalTitle.style.color = winner === 'X' ? "var(--neon-blue)" : "var(--neon-pink)";

                if (isVsCPU && winner === 'O') AudioEngine.playLose();
                else AudioEngine.playWin();

                setTimeout(() => modal.classList.add('active'), 500);
            };

            const resetGame = () => {
                state = Array(9).fill(null);
                history = { X: [], O: [] };
                turn = 'X';
                gameActive = true;
                renderState();
                AudioEngine.playVanishing(); // Som de reset
            };

            const setMode = (vsCPU, btnEl) => {
                isVsCPU = vsCPU;
                document.querySelectorAll('.controls-row button').forEach(b => b.classList.remove('active-mode'));
                btnEl.classList.add('active-mode');
                p2Label.innerText = vsCPU ? "CPU O" : "Player O";
                scores = { X: 0, O: 0 };
                scoreXEl.innerText = '0';
                scoreOEl.innerText = '0';
                resetGame();
            };

            return {
                init,
                closeModal: () => { modal.classList.remove('active'); resetGame(); }
            };
        })();

        window.addEventListener('DOMContentLoaded', Game.init);

    </script>
</body>
</html>
